# Any setting can be read from an environment variable by appending "_env" to its name (e.g. bot_token_env: DISCORD_BOT_TOKEN).

bot_token_env: DISCORD_BOT_TOKEN
client_id_env: DISCORD_CLIENT_ID

status_message: The offspring of Munkee.

max_text: 100000
max_images: 5
max_messages: 25
max_attachment_text: 100000
max_urls: 3
max_url_text: 15000
url_fetch_timeout: 10

use_plain_responses: true
allow_dms: true

permissions:
  users:
    admin_ids: [206460137819340800]
    allowed_ids: []
    blocked_ids: []

  roles:
    allowed_ids: []
    blocked_ids: []

  channels:
    allowed_ids: []
    blocked_ids: []

providers:
  openrouter:
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY

  openai:
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY

  x-ai:
    base_url: https://api.x.ai/v1
    api_key_env: X_AI_API_KEY

  google:
    base_url: https://generativelanguage.googleapis.com/v1beta/openai
    api_key_env: GEMINI_API_KEY

  azure-openai:
    base_url: https://<resource name>.openai.azure.com/openai/deployments/<deployment name>
    api_key_env: AZURE_OPENAI_API_KEY
    extra_query:
      api-version: 2024-12-01-preview

  lmstudio:
    base_url: http://localhost:1234/v1

  ollama:
    base_url: http://localhost:11434/v1

  vllm:
    base_url: http://localhost:8000/v1

